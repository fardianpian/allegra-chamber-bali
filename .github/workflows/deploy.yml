name: Build and Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro static)
        run: npm run build
        env:
          PUBLIC_WEB3FORMS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_KEY }}
          PUBLIC_SITE_URL: https://allegra.indonesiaistimewastudio.id

      # Upload the built static files to the Hostinger sub-domain document root via FTP.
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # e.g. /domains/indonesiaistimewastudio.id/public_html/allegra/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          # Keep server-side files not produced by the build (optional)
          dangerous-clean-slate: false
